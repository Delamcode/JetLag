<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question Menu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #e8e8e8;
            min-height: 100vh;
        }

        .header {
            background-color: #c0392b;
            padding: 18px 20px;
            text-align: center;
        }

        .header h1 {
            color: white;
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            letter-spacing: 4px;
            font-weight: 700;
        }

        .main-content {
            padding: 20px;
        }

        .categories-wrapper {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, max-content));
            justify-content: center;
            gap: 24px;
        }

        @media (max-width: 640px) {
            .categories-wrapper {
                grid-template-columns: 1fr;
            }
        }

        /* ── Category column ── */
        .category-column {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 10px;
            border-bottom: 3px solid var(--cat-color);
            cursor: pointer;
            border-radius: 4px;
            transition: filter 0.15s ease;
            user-select: none;
        }

        .category-header:hover {
            filter: brightness(1.15);
        }

        .category-header:active {
            filter: brightness(0.9);
        }

        .category-icon-wrapper {
            width: 52px;
            height: 52px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background-color: var(--cat-color);
        }

        .category-icon-wrapper img {
            width: 36px;
            height: 36px;
            object-fit: contain;
            filter: brightness(0) invert(1);
        }

        .category-info {
            display: flex;
            flex-direction: column;
        }

        .category-name {
            font-size: 1.05rem;
            font-weight: 900;
            color: #222;
            letter-spacing: 1px;
            line-height: 1.2;
        }

        .category-reward {
            font-size: 0.72rem;
            color: #555;
            font-weight: 600;
            letter-spacing: 1px;
            margin-top: 3px;
        }

        /* ── Questions grid ── */
        .questions-grid {
            --btn-size: 55px;
            --grid-gap: 5px;
            display: grid;
            gap: var(--grid-gap);
            /*
                Desktop: grid-template-columns set inline from JSON columns value,
                e.g. repeat(5, var(--btn-size))
                This makes the grid exactly as wide as the buttons need to be.
            */
        }

        /*
            Buttons are always square via aspect-ratio: 1.
            width: 100% fills the grid cell.
            The grid cell width is always --btn-size, so the button is always
            --btn-size × --btn-size regardless of screen size.
        */
        .question-btn {
            width: 100%;
            aspect-ratio: 1;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 6px;
            background-color: var(--cat-color);
            transition: transform 0.15s ease, filter 0.15s ease;
        }

        .question-btn:hover {
            transform: scale(1.08);
            filter: brightness(1.15);
        }

        .question-btn:active {
            transform: scale(0.96);
        }

        /*
            Image sized as percentage of the button — stays correct
            as the button scales without any calc() needed.
        */
        .question-btn img {
            width: 58%;
            height: 58%;
            object-fit: contain;
            filter: brightness(0) invert(1);
        }

        .question-btn .btn-label {
            font-size: 0.55rem;
            color: white;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-top: 2px;
            text-align: center;
            line-height: 1.1;
        }

        /*
            On mobile the category is full width, so we let auto-fill
            pack as many fixed-size buttons as fit, with the remainder
            becoming gap — never stretching buttons into rectangles.
        */
        @media (max-width: 640px) {
            .questions-grid {
                grid-template-columns: repeat(auto-fill, var(--btn-size)) !important;
                justify-content: start;
            }
        }

        /* ── Shared modal base ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(3px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 12px;
            max-width: 480px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
            animation: popIn 0.2s ease;
        }

        @keyframes popIn {
            from { transform: scale(0.85); opacity: 0; }
            to   { transform: scale(1);    opacity: 1; }
        }

        .modal-header {
            padding: 20px 20px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            position: sticky;
            top: 0;
            background: white;
            z-index: 1;
            border-radius: 12px 12px 0 0;
        }

        .modal-icon {
            width: 64px;
            height: 64px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .modal-icon img {
            width: 44px;
            height: 44px;
            object-fit: contain;
            filter: brightness(0) invert(1);
        }

        .modal-title-block {
            flex: 1;
        }

        .modal-eyebrow {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 4px;
        }

        .modal-main-title {
            font-size: 1.15rem;
            font-weight: 900;
            color: #222;
            line-height: 1.3;
            letter-spacing: 0.5px;
        }

        .modal-body {
            padding: 0 20px 24px;
        }

        .modal-divider {
            height: 2px;
            margin-bottom: 18px;
            border-radius: 1px;
        }

        .modal-description {
            font-size: 0.92rem;
            color: #444;
            line-height: 1.6;
        }

        /* Category modal: structured info rows */
        .info-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .info-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .info-label {
            font-size: 0.68rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #aaa;
        }

        .info-value {
            font-size: 0.92rem;
            color: #333;
            line-height: 1.55;
        }

        .info-value.mono {
            font-family: 'Courier New', monospace;
            background: #f4f4f4;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 0.88rem;
            color: #222;
        }

        .badge-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 2px;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            color: white;
            letter-spacing: 0.5px;
        }

        .notes-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 2px;
        }

        .notes-list li {
            font-size: 0.88rem;
            color: #555;
            line-height: 1.55;
            padding-left: 16px;
            position: relative;
        }

        .notes-list li::before {
            content: '•';
            position: absolute;
            left: 0;
            color: #bbb;
            font-weight: 900;
        }

        .modal-close {
            display: block;
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 1px;
            transition: filter 0.15s;
        }

        .modal-close:hover {
            filter: brightness(1.15);
        }

        .status-message {
            text-align: center;
            padding: 60px 20px;
            color: #666;
            font-size: 1.1rem;
        }

        .status-message.error {
            color: #c0392b;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>QUESTION MENU</h1>
</div>

<div class="main-content">
    <div id="categories-container" class="categories-wrapper">
        <div class="status-message">Loading questions…</div>
    </div>
</div>

<div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal" id="modal">
        <div class="modal-header" id="modal-header">
            <div class="modal-icon" id="modal-icon">
                <img id="modal-icon-img" src="" alt="">
            </div>
            <div class="modal-title-block">
                <div class="modal-eyebrow" id="modal-eyebrow"></div>
                <div class="modal-main-title" id="modal-main-title"></div>
            </div>
        </div>
        <div class="modal-body">
            <div class="modal-divider" id="modal-divider"></div>
            <div id="modal-content"></div>
            <button class="modal-close" id="modal-close-btn" onclick="closeModal()">CLOSE</button>
        </div>
    </div>
</div>

<script>
    async function loadQuestions() {
        try {
            const res = await fetch('questions.json');
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            render(Array.isArray(data) ? data : data.categories);
        } catch (err) {
            document.getElementById('categories-container').innerHTML =
                `<div class="status-message error">
                    ⚠️ Could not load questions.json<br>
                    <small style="color:#999;margin-top:8px;display:block">${err.message}</small>
                </div>`;
        }
    }

    function render(categories) {
        const container = document.getElementById('categories-container');
        container.innerHTML = '';
        categories.forEach(cat => container.appendChild(buildColumn(cat)));
    }

    function buildColumn(cat) {
        const color   = cat.color   || '#2c3e50';
        const columns = cat.columns || 1;

        const col = document.createElement('div');
        col.className = 'category-column';
        col.style.setProperty('--cat-color', color);

        const header = document.createElement('div');
        header.className = 'category-header';
        header.setAttribute('role', 'button');
        header.setAttribute('tabindex', '0');
        header.setAttribute('aria-label', `${cat.name} category info`);

        const iconWrap = document.createElement('div');
        iconWrap.className = 'category-icon-wrapper';

        if (cat.icon) {
            const img = document.createElement('img');
            img.src = cat.icon;
            img.alt = cat.name || '';
            img.onerror = () => img.remove();
            iconWrap.appendChild(img);
        }

        const info = document.createElement('div');
        info.className = 'category-info';

        const nameEl = document.createElement('div');
        nameEl.className = 'category-name';
        nameEl.textContent = (cat.name || '').toUpperCase();

        const rewardEl = document.createElement('div');
        rewardEl.className = 'category-reward';
        rewardEl.textContent = (cat.reward || '').toUpperCase();

        info.append(nameEl, rewardEl);
        header.append(iconWrap, info);

        header.addEventListener('click', () => openCategoryModal(cat, color));
        header.addEventListener('keydown', e => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                openCategoryModal(cat, color);
            }
        });

        col.appendChild(header);

        const grid = document.createElement('div');
        grid.className = 'questions-grid';
        grid.style.gridTemplateColumns = `repeat(${columns}, var(--btn-size, 55px))`;

        (cat.questions || []).forEach(q => grid.appendChild(buildButton(q, cat, color)));

        col.appendChild(grid);
        return col;
    }

    function buildButton(q, cat, color) {
        const btn = document.createElement('button');
        btn.className = 'question-btn';
        btn.setAttribute('aria-label', q.title || q.name || 'Question');

        if (q.icon) {
            const img = document.createElement('img');
            img.src = q.icon;
            img.alt = q.title || q.name || '';
            img.onerror = () => img.remove();
            btn.appendChild(img);
        }

        if (q.label) {
            const span = document.createElement('span');
            span.className = 'btn-label';
            span.textContent = q.label;
            btn.appendChild(span);
        }

        btn.addEventListener('click', () => openQuestionModal(q, cat, color));
        return btn;
    }

    // ── Modal helpers ─────────────────────────────────────────────────────────
    function applyModalChrome(color, iconSrc, iconAlt, eyebrow, title) {
        document.getElementById('modal-icon').style.backgroundColor  = color;
        document.getElementById('modal-divider').style.backgroundColor = color;
        document.getElementById('modal-close-btn').style.backgroundColor = color;

        const iconImg = document.getElementById('modal-icon-img');
        if (iconSrc) {
            iconImg.src = iconSrc;
            iconImg.alt = iconAlt || '';
            iconImg.style.display = 'block';
        } else {
            iconImg.style.display = 'none';
        }

        document.getElementById('modal-eyebrow').textContent    = eyebrow;
        document.getElementById('modal-main-title').textContent = title;
    }

    function showModal() {
        document.getElementById('modal-overlay').classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function openCategoryModal(cat, color) {
        applyModalChrome(
            color,
            cat.icon || '',
            cat.name || '',
            'Category Info',
            (cat.name || '').toUpperCase()
        );

        const content = document.getElementById('modal-content');
        content.innerHTML = '';

        const grid = document.createElement('div');
        grid.className = 'info-grid';

        if (cat.reward) {
            grid.appendChild(makeInfoRow('Reward', cat.reward));
        }

        if (cat.format) {
            const val = document.createElement('div');
            val.className = 'info-value mono';
            val.textContent = cat.format;
            grid.appendChild(makeInfoRow('Format', null, val));
        }

        if (cat.valid_answers && cat.valid_answers.length) {
            const badgeList = document.createElement('div');
            badgeList.className = 'badge-list';
            cat.valid_answers.forEach(answer => {
                const badge = document.createElement('span');
                badge.className = 'badge';
                badge.style.backgroundColor = color;
                badge.textContent = answer.toUpperCase();
                badgeList.appendChild(badge);
            });
            grid.appendChild(makeInfoRow('Valid Answers', null, badgeList));
        }

        if (cat.time_limit_minutes != null) {
            grid.appendChild(makeInfoRow(
                'Time Limit',
                `${cat.time_limit_minutes} minute${cat.time_limit_minutes !== 1 ? 's' : ''}`
            ));
        }

        if (cat.notes && cat.notes.length) {
            const ul = document.createElement('ul');
            ul.className = 'notes-list';
            cat.notes.forEach(note => {
                const li = document.createElement('li');
                li.textContent = note;
                ul.appendChild(li);
            });
            grid.appendChild(makeInfoRow('Notes', null, ul));
        }

        content.appendChild(grid);
        showModal();
    }

    function openQuestionModal(q, cat, color) {
        applyModalChrome(
            color,
            q.icon  || '',
            q.title || q.name || '',
            (cat.name || '').toUpperCase(),
            q.title || q.name || ''
        );

        const content = document.getElementById('modal-content');
        content.innerHTML = '';

        const desc = document.createElement('div');
        desc.className = 'modal-description';
        desc.innerHTML = q.description ||
            '<em style="color:#aaa">No description available.</em>';
        content.appendChild(desc);

        showModal();
    }

    function makeInfoRow(label, textValue, nodeValue) {
        const row = document.createElement('div');
        row.className = 'info-row';

        const labelEl = document.createElement('div');
        labelEl.className = 'info-label';
        labelEl.textContent = label;
        row.appendChild(labelEl);

        if (nodeValue) {
            row.appendChild(nodeValue);
        } else {
            const val = document.createElement('div');
            val.className = 'info-value';
            val.textContent = textValue || '';
            row.appendChild(val);
        }

        return row;
    }

    function closeModal() {
        document.getElementById('modal-overlay').classList.remove('active');
        document.body.style.overflow = '';
    }

    document.getElementById('modal-overlay').addEventListener('click', e => {
        if (e.target === document.getElementById('modal-overlay')) closeModal();
    });

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeModal();
    });

    loadQuestions();
</script>
</body>
</html>
